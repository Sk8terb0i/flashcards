<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#eae6df">
    <title>Biology Flashcards</title>

    <style>
        :root {
            --bg-cream: #eae6df;
            --text-dark: #1a1a1a;
            --blob-pink: #ff7597;
            --blob-olive: #6b8e23;
            --blob-navy: #1f3c5b;
            --blob-sand: #d4cbb8;
            --white: #ffffff;
            --danger: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HOME SCREEN --- */
        #home-screen {
            padding: 40px 20px 20px 20px;
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .subject-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 450px;
            text-align: left;
        }

        .deck-list {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px;
        }

        .deck-card {
            border-radius: 32px;
            padding: 30px;
            color: var(--white);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
        }

        /* Cute Blob Eyes */
        .eyes {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .eye {
            width: 18px;
            height: 18px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .eye::after {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--text-dark);
            border-radius: 50%;
            transform: translateX(2px); /* Looking right slightly */
        }

        .deck-title {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 5px 0;
            line-height: 1.1;
        }

        .deck-info {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .deck-actions {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            color: var(--white);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .action-btn.play { flex-grow: 1; justify-content: center; }
        
        /* Badges for Fails */
        .fail-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
        }

        /* --- LEARNING SCREEN --- */
        #learn-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: var(--bg-cream);
            z-index: 10;
            box-sizing: border-box;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .learn-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 450px;
            margin: 0 auto 20px auto;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-dark);
            cursor: pointer;
            padding: 10px;
        }

        .progress-indicator {
            font-weight: 800;
            font-size: 16px;
            background: var(--white);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .card-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
        }

        .flashcard {
            width: 100%;
            height: 70vh;
            max-height: 600px;
            position: absolute;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            cursor: pointer;
        }

        .flashcard.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 32px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .card-face::-webkit-scrollbar { display: none; }

        .card-front {
            background-color: var(--blob-pink);
            color: var(--white);
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .card-back {
            background-color: var(--white);
            color: var(--text-dark);
            transform: rotateY(180deg);
            font-size: 16px;
            line-height: 1.6;
            font-weight: 500;
        }
        
        .card-back h4 {
            margin-top: 0;
            font-size: 20px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 10px;
        }
        .card-back ul { padding-left: 20px; margin-top: 0; }
        .card-back li { margin-bottom: 8px; }
        .card-back a { color: var(--blob-navy); font-weight: 800; }
        .card-back img { max-width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee;}

        /* Desktop Controls (Hidden on Mobile) */
        .desktop-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .desktop-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .d-btn {
            background: var(--white);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .d-btn:active { transform: scale(0.9); }

        @media (max-width: 768px) {
            .desktop-controls { display: none !important; }
        }

        /* Shake Animation for wrong interaction */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s; }

    </style>
</head>
<body>

    <div id="home-screen">
        <div class="subject-title">Biology</div>
        <div class="deck-list" id="deck-list">
            </div>
    </div>

    <div id="learn-screen">
        <div class="learn-header">
            <button class="back-btn" onclick="goHome()">✖</button>
            <div class="progress-indicator" id="progress">1 / 10</div>
        </div>
        
        <div class="card-wrapper" id="card-container">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front" id="card-front">Lade...</div>
                <div class="card-face card-back" id="card-back">Lade...</div>
            </div>
        </div>

        <div class="desktop-controls" id="desktop-controls">
            <button class="d-btn" onclick="markWrong()">❌</button>
            <button class="d-btn" onclick="markCorrect()">✅</button>
        </div>
    </div>

        // SYSTEM STATE
        let activeDeckKey = "";
        let currentIndex = 0;
        let isTrainingMode = false;

        // Initialize App
        function init() {
            renderHomeScreen();
            setupSwipeLogic();
        }

        // Return Wrong Cards from LocalStorage
        function getWrongCards(deckKey) {
            const stored = localStorage.getItem('med_fails_' + deckKey);
            return stored ? JSON.parse(stored) : [];
        }

        function saveWrongCards(deckKey, cardsArray) {
            localStorage.setItem('med_fails_' + deckKey, JSON.stringify(cardsArray));
            renderHomeScreen(); // Update counts
        }

        // Render Decks on Home Screen
        function renderHomeScreen() {
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            
            for (let key in data) {
                const totalCards = data[key].cards.length;
                const wrongCount = getWrongCards(key).length;
                const color = data[key].color;

                const cardHTML = `
                    <div class="deck-card" style="background: ${color}">
                        <div class="eyes">
                            <div class="eye"></div><div class="eye"></div>
                        </div>
                        <h2 class="deck-title">${key}</h2>
                        <div class="deck-info">${totalCards} Cards</div>
                        
                        <div class="deck-actions">
                            <button class="action-btn play" onclick="startDeck('${key}', false)">
                                ▶ Start
                            </button>
                            ${wrongCount > 0 ? `
                            <button class="action-btn" onclick="startDeck('${key}', true)">
                                ↻ Fails <span class="fail-badge">${wrongCount}</span>
                            </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', cardHTML);
            }
        }

        // Start Learning
        function startDeck(key, training) {
            activeDeckKey = key;
            isTrainingMode = training;
            currentIndex = 0;

            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('learn-screen').style.display = 'flex';
            
            updateCardView();
        }

        function goHome() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('learn-screen').style.display = 'none';
        }

        function getActiveCardSet() {
            return isTrainingMode ? getWrongCards(activeDeckKey) : data[activeDeckKey].cards;
        }

        // Update the visual card
        function updateCardView() {
            const cards = getActiveCardSet();
            if (!cards || cards.length === 0) {
                if (isTrainingMode) {
                    alert("All fails cleared!");
                    goHome();
                } else {
                    goHome();
                }
                return;
            }

            if (currentIndex >= cards.length) currentIndex = 0;

            const flashcard = document.getElementById('flashcard');
            flashcard.style.transition = 'none';
            flashcard.style.transform = 'translateX(0) rotate(0)';
            flashcard.classList.remove('is-flipped');
            
            // Hide desktop controls until flipped
            document.getElementById('desktop-controls').classList.remove('visible');

            setTimeout(() => {
                const front = document.getElementById('card-front');
                front.innerHTML = cards[currentIndex].q;
                front.style.backgroundColor = data[activeDeckKey].color;
                
                document.getElementById('card-back').innerHTML = cards[currentIndex].a;
                document.getElementById('progress').innerText = `${currentIndex + 1} / ${cards.length}`;
                
                flashcard.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
            }, 50);
        }

        // FLIP LOGIC
        function flipCard() {
            const card = document.getElementById('flashcard');
            card.classList.toggle('is-flipped');
            
            // Show/hide desktop buttons based on flip state
            if (card.classList.contains('is-flipped')) {
                document.getElementById('desktop-controls').classList.add('visible');
                card.style.transform = 'rotateY(180deg)';
            } else {
                document.getElementById('desktop-controls').classList.remove('visible');
                card.style.transform = 'translateX(0) rotate(0)';
            }
        }

        // MARKING LOGIC
        function markCorrect() {
            const cardElement = document.getElementById('flashcard');
            if (!cardElement.classList.contains('is-flipped')) {
                shakeCard(); return;
            }

            const cards = getActiveCardSet();
            const currentCard = cards[currentIndex];
            let wrongs = getWrongCards(activeDeckKey);

            wrongs = wrongs.filter(c => c.q !== currentCard.q);
            saveWrongCards(activeDeckKey, wrongs);

            animateSwipe('right');
        }

        function markWrong() {
            const cardElement = document.getElementById('flashcard');
            if (!cardElement.classList.contains('is-flipped')) {
                shakeCard(); return;
            }

            const cards = getActiveCardSet();
            const currentCard = cards[currentIndex];
            let wrongs = getWrongCards(activeDeckKey);

            if (!wrongs.some(c => c.q === currentCard.q)) {
                wrongs.push(currentCard);
                saveWrongCards(activeDeckKey, wrongs);
            }

            animateSwipe('left');
        }

        function animateSwipe(direction) {
            const card = document.getElementById('flashcard');
            card.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            
            // Note: Since card is flipped (180deg), we must maintain the Y rotation while swiping
            if(direction === 'right') {
                card.style.transform = 'translateX(150%) rotateY(180deg) rotate(20deg)';
            } else {
                card.style.transform = 'translateX(-150%) rotateY(180deg) rotate(-20deg)';
            }

            setTimeout(() => {
                if (!(isTrainingMode && direction === 'right')) {
                    currentIndex++;
                }
                updateCardView();
            }, 350);
        }

        function shakeCard() {
            const card = document.getElementById('flashcard');
            card.classList.remove('shake');
            void card.offsetWidth; // trigger reflow
            card.classList.add('shake');
        }

        // TOUCH & SWIPE HANDLING
        function setupSwipeLogic() {
            const container = document.getElementById('card-container');
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            let startTime = 0;

            container.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = true;
                startTime = new Date().getTime();
            }, {passive: true});

            container.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                
                const card = document.getElementById('flashcard');
                // Only allow swiping if flipped
                if (!card.classList.contains('is-flipped')) return;

                currentX = e.touches[0].clientX;
                const diffX = currentX - startX;
                
                card.style.transition = 'none';
                let rotate = diffX * 0.05;
                card.style.transform = `translateX(${diffX}px) rotateY(180deg) rotate(${rotate}deg)`;
            }, {passive: true});

            container.addEventListener('touchend', (e) => {
                isDragging = false;
                const card = document.getElementById('flashcard');
                
                // If it was just a tap (no movement)
                if (currentX === 0) {
                    flipCard();
                    return;
                }

                if (!card.classList.contains('is-flipped')) return;

                card.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                const diffX = currentX - startX;
                const timeDiff = new Date().getTime() - startTime;
                
                if (diffX > 80 || (diffX > 30 && timeDiff < 250)) {
                    markCorrect();
                } else if (diffX < -80 || (diffX < -30 && timeDiff < 250)) {
                    markWrong();
                } else {
                    card.style.transform = 'rotateY(180deg)';
                }
                currentX = 0; 
            });
            
            // Mouse click support for flipping
            container.addEventListener('mousedown', (e) => {
                startX = e.clientX;
            });
            container.addEventListener('mouseup', (e) => {
                if (Math.abs(e.clientX - startX) < 10) {
                    flipCard();
                }
            });
        }

        window.onload = init;
    </script>
