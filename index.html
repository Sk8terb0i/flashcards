<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medizin Flashcards - Komplett</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            color: #333;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; }
        .deck-selector { margin-bottom: 20px; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #bdc3c7; font-size: 1em; cursor: pointer; }
        
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            max-width: 550px;
            height: 450px; /* Grösser, da viel mehr Infos! */
            margin-bottom: 20px;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            border-radius: 12px;
            background-color: white;
            overflow-y: auto; /* Erlaubt scrollen bei viel Text */
        }
        .card-front { 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 1.3em; 
            text-align: center; 
            color: #2c3e50; 
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f8 100%);
        }
        .card-back { 
            transform: rotateY(180deg); 
            font-size: 0.95em; 
            color: #34495e; 
            align-items: flex-start; 
            justify-content: flex-start; 
            line-height: 1.5;
        }
        .card-back h4 { margin-top: 0; color: #2980b9; margin-bottom: 10px; }
        .card-back img { max-width: 100%; border-radius: 5px; margin: 10px 0; border: 1px solid #ddd; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;}
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover { background-color: #2980b9; }
        .btn-edit { background-color: #9b59b6; }
        .btn-edit:hover { background-color: #8e44ad; }
        .btn-reset { background-color: #e74c3c; }
        .btn-reset:hover { background-color: #c0392b; }
        
        .progress { margin-bottom: 10px; font-weight: bold; color: #7f8c8d; }
        a { color: #e67e22; word-break: break-all; text-decoration: none; font-weight: bold;}
        a:hover { text-decoration: underline; }
        ul { padding-left: 20px; margin-top: 5px; margin-bottom: 10px;}
        li { margin-bottom: 6px; }

        .edit-form {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            box-sizing: border-box;
            margin-bottom: 30px;
        }
        .edit-form textarea, .edit-form select { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; font-family: inherit; border: 1px solid #ccc; border-radius: 5px;}
    </style>
</head>
<body>

    <h1>Medizin Flashcards</h1>
    
    <div class="deck-selector">
        <label for="deck-select"><strong>Wähle ein Deck:</strong> </label>
        <select id="deck-select" onchange="changeDeck()">
            </select>
    </div>

    <div class="progress" id="progress">Karte 1 von X</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
            <div class="card-face card-front" id="card-front">Lade...</div>
            <div class="card-face card-back" id="card-back">Lade...</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">◄ Zurück</button>
        <button onclick="nextCard()">Weiter ►</button>
        <button class="btn-edit" onclick="toggleEditForm()">Neu / Bearbeiten</button>
        <button class="btn-reset" onclick="resetCards()">Alle Decks Reset</button>
    </div>

    <div class="edit-form" id="edit-form">
        <h3>Karte hinzufügen oder bearbeiten</h3>
        <label>Deck:</label>
        <select id="edit-deck"></select>
        <label>Frage:</label>
        <textarea id="edit-q" rows="3"></textarea>
        <label>Antwort (HTML erlaubt):</label>
        <textarea id="edit-a" rows="8"></textarea>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button onclick="saveNewCard()" style="background-color: #2ecc71;">Als neue Karte anlegen</button>
            <button onclick="updateCurrentCard()" style="background-color: #f39c12;">Aktuelle Karte überschreiben</button>
        </div>
    </div>

    <script>

                    a: "<h4>Zellkern (Nucleus) & Zytoplasma</h4><ul><li><b>Zellkern:</b> Zentrum der Zelle. Steuert wichtige Stoffwechselprozesse (z.B. Zellteilung), lagert die Erbinformation (DNA) in Form von Chromosomen.</li><li><b>Kernkörperchen (Nucleolus):</b> Kleine, kugelförmige Struktur im Kern. Besteht aus DNA, RNA, Proteinen und Enzymen. Wichtig für Synthese von Ribosomen (und somit Zellteilung).</li><li><b>Zellplasma (Zytoplasma):</b> Besteht aus dem flüssigen Zytosol (Wasser, Proteine, Lipide, RNA, Kohlenhydrate, Ionen, Enzyme) und dem festen Zytoskelett. Aufgaben: Steuerung Stoffwechselprozesse, Abbau schädlicher Substanzen.</li><li><b>Zellskelett (Mikrotubuli):</b> Stütz- und Bewegungsapparat, beteiligt an Zellteilung und Zellmotilität (Bewegung).</li></ul>"

                {

                    a: "<h4>Osteoporose</h4>Progressive metabolische Knochenkrankheit. Erniedrigte Knochenmineraldichte (Masse pro Volumeneinheit) & Zerfall der Struktur. Führt zu Fragilitätsfrakturen nach geringen/stummen Traumata (v.a. thorakale/lumbale Wirbelsäule, Handgelenk, Hüfte).<br><a href='https://www.ksw.ch/gesundheitsthemen/osteoporose/' target='_blank'>Link zum Osteoporose-Bild</a><br><br><h4>Fraktur</h4>Ein Bruch in einem Knochen. Meist durch eine einzige, signifikante Kraft, die auf normalen Knochen ausgeübt wird."

                {
                    q: "Wie unterscheidet man Arthrose, Osteoporose und Fraktur im Röntgenbild?",

                    a: "<h4>Dyspnoe</h4>Subjektive Atemnot. Atmung wird als unangenehm oder anstrengend empfunden (unterschiedlich erfahren je nach Ursache).<br><br><h4>Pneumonie</h4>Akute Entzündung des Lungenparenchyms (Alveolarraum und/oder interstitielles Lungengewebe). In erster Linie infektiös bedingt (Bakterien, Viren, Pilze, Protozoen, Parasiten). Ambulant, nosokomial oder bei Immunsupprimierten. Erstdiagnose meist durch Röntgen-Thorax-Bild & klinische Befunde."

                {
                    q: "Definieren Sie den Begriff Schmerzen und den Unterschied zwischen akut und chronisch.",
                    a: "Ein unangenehmes Sinnes- oder Gefühlserlebnis, das mit einer tatsächlichen/potenziellen Gewebeschädigung einhergeht (sensorische/emotionale Komponenten).<br><br><b>Akut:</b> Antwort auf Gewebeschädigung. Aktivierung peripherer Schmerzrezeptoren & deren sensorischen ADelta-/C-Nervenfasern (Nozizeptoren).<br><br><b>Chronisch:</b> Mit andauernder Schädigung verbunden (persistierende Aktivierung d. Fasern) ODER durch anhaltende Schädigung/Funktionsstörung des peripheren/zentralen Nervensystems (neuropathisch). Schwere der Verletzung lässt nicht immer auf Schwere der Schmerzen schliessen."

                    q: "Was sind Metastasen und wie verbreiten sie sich?",

                    a: "<b>Niereninsuffizienz:</b> Nieren können Abbauprodukte nicht mehr hinreichend ausscheiden. Akut (Nierenversagen) oder chronisch. Wasser-, Elektrolyt- (Natrium, Kalium, Kalzium, Phosphat) und Säure-Gleichgewicht gestört.<br><br><b>Laborwert:</b> Kreatinin (Stoffwechselprodukt aus Muskeln). Die Kreatinin-Clearance misst die Ausscheidung und schätzt die glomeruläre Filtrationsrate (GFR).<br><br><b>Radiologie:</b> Vor intravasaler Kontrastmittelgabe (Röntgen/MRT) geprüft. Kontrastmittel wird über Niere ausgeschieden. Bei Insuffizienz verlangsamt -> Mittel verweilt zu lange -> Nebenwirkungen."

        let decks = {};
        let currentDeckKey = "";
        let currentIndex = 0;

        function init() {
            const stored = localStorage.getItem('med_flashcards_v2');
            if(stored) {
                decks = JSON.parse(stored);
            } else {
                decks = JSON.parse(JSON.stringify(defaultDecks));
                localStorage.setItem('med_flashcards_v2', JSON.stringify(decks));
            }
            
            // Populate selectors
            const deckSelect = document.getElementById('deck-select');
            const editDeckSelect = document.getElementById('edit-deck');
            deckSelect.innerHTML = "";
            editDeckSelect.innerHTML = "";
            
            for(let key in decks) {
                let opt1 = document.createElement("option");
                opt1.value = key;
                opt1.textContent = key;
                deckSelect.appendChild(opt1);
                
                let opt2 = document.createElement("option");
                opt2.value = key;
                opt2.textContent = key;
                editDeckSelect.appendChild(opt2);
            }

            currentDeckKey = Object.keys(decks)[0];
            updateView();
        }

        function changeDeck() {
            currentDeckKey = document.getElementById('deck-select').value;
            currentIndex = 0;
            updateView();
        }

        function updateView() {
            let cards = decks[currentDeckKey];
            if(!cards || cards.length === 0) return;
            
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('card-front').innerHTML = cards[currentIndex].q;
                document.getElementById('card-back').innerHTML = cards[currentIndex].a;
                document.getElementById('progress').innerText = `Karte ${currentIndex + 1} von ${cards.length}`;
                
                document.getElementById('edit-q').value = cards[currentIndex].q;
                document.getElementById('edit-a').value = cards[currentIndex].a;
                document.getElementById('edit-deck').value = currentDeckKey;
            }, 150);
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('is-flipped'); }

        function nextCard() {
            let cards = decks[currentDeckKey];
            currentIndex = (currentIndex + 1) % cards.length;
            updateView();
        }

        function prevCard() {
            let cards = decks[currentDeckKey];
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            updateView();
        }

        function toggleEditForm() {
            const form = document.getElementById('edit-form');
            form.style.display = form.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveNewCard() {
            const targetDeck = document.getElementById('edit-deck').value;
            const q = document.getElementById('edit-q').value;
            const a = document.getElementById('edit-a').value;
            if(q && a) {
                decks[targetDeck].push({q, a});
                localStorage.setItem('med_flashcards_v2', JSON.stringify(decks));
                
                if(targetDeck === currentDeckKey) {
                    currentIndex = decks[currentDeckKey].length - 1;
                    updateView();
                } else {
                    alert("Karte im Deck '" + targetDeck + "' gespeichert.");
                }
                toggleEditForm();
            }
        }

        function updateCurrentCard() {
            const targetDeck = document.getElementById('edit-deck').value;
            const q = document.getElementById('edit-q').value;
            const a = document.getElementById('edit-a').value;
            
            if(q && a) {
                if(targetDeck === currentDeckKey) {
                    decks[currentDeckKey][currentIndex] = {q, a};
                } else {
                    // Move card to another deck
                    decks[currentDeckKey].splice(currentIndex, 1);
                    decks[targetDeck].push({q, a});
                    currentIndex = 0; 
                    currentDeckKey = targetDeck;
                    document.getElementById('deck-select').value = targetDeck;
                }
                localStorage.setItem('med_flashcards_v2', JSON.stringify(decks));
                updateView();
                toggleEditForm();
            }
        }

        function resetCards() {
            if(confirm("ACHTUNG: Willst du alle eigenen Änderungen komplett löschen und den Original-Zustand wiederherstellen?")) {
                decks = JSON.parse(JSON.stringify(defaultDecks));
                localStorage.setItem('med_flashcards_v2', JSON.stringify(decks));
                currentDeckKey = Object.keys(decks)[0];
                document.getElementById('deck-select').value = currentDeckKey;
                currentIndex = 0;
                updateView();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
